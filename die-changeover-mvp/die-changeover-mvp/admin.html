<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin / Maintenance</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar dark">
      <div class="brand-logo large">MAGNA</div>
      <nav>
        <a class="nav-link" href="board.html">Die Setter Board</a>
        <a class="nav-link" href="supervisor.html">Supervisor</a>
        <a class="nav-link active" href="admin.html">Admin / Maintenance</a>
        <a class="nav-link" href="index.html">Home</a>
      </nav>
      <div class="sidebar-footer">
        <div id="currentUserAdmin" class="user-pill">Admin Demo</div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>Admin / Maintenance</h1>
          <p class="muted">Manage presses, users, and status definitions</p>
        </div>
      </header>

      <section class="grid-3">
        <div class="card">
          <div class="section-header">
            <h2>Users</h2>
            <button id="seedUsersBtn" class="button">Seed Demo Users</button>
          </div>
          <div id="usersList" class="admin-list"></div>
        </div>

        <div class="card">
          <div class="section-header">
            <h2>Presses</h2>
            <button id="seedPressesBtn" class="button">Seed Presses</button>
          </div>
          <div id="pressesList" class="admin-list"></div>
        </div>

        <div class="card">
          <div class="section-header">
            <h2>Status Types</h2>
            <button id="seedStatusesBtn" class="button">Seed Statuses</button>
          </div>
          <div id="statusesList" class="admin-list"></div>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Audit Log</h2>
          <button id="refreshAdminBtn" class="button">Refresh</button>
        </div>
        <div id="auditLog" class="history-list"></div>
      </section>
    </main>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
