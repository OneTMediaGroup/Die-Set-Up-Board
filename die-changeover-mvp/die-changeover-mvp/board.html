<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Die Setter Board</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="display-board-body">
  <div class="display-board-shell">

    <header class="display-board-header">
      <div class="display-brand-wrap">
        <div class="brand-logo display-brand">MAGNA</div>
        <div>
          <h1>Die Changeover Board</h1>
          <p>Touchscreen floor view for die setters</p>
        </div>
      </div>

      <div class="display-controls">
        <label>
          Area
          <select id="areaFilterBoard">
            <option value="all">All</option>
          </select>
        </label>

        

        <button class="button" id="refreshBoardBtn">Refresh</button>

        <div class="display-sync-card">
          <span>Last Sync</span>
          <strong id="syncTimeBoard">--</strong>
        </div>

        
      </div>
    </header>

    <main class="display-board-scroll-area">
      <section class="press-grid die-board-grid" id="pressGrid"></section>
    </main>

    <footer class="display-footer">
      © One T Media Group
    </footer>
  </div>

  <dialog id="setupDialog" class="action-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-header">
        <div>
          <h2 id="dialogTitle">Setup</h2>
          <p id="dialogSubtitle" class="muted"></p>
        </div>
        <button class="icon-button" value="cancel">✕</button>
      </div>

      <div class="dialog-body">
        <div class="info-grid">
          <div><span>Part</span><strong id="dialogPart">--</strong></div>
          <div><span>Qty Remaining</span><strong id="dialogQty">--</strong></div>
          <div><span>Status</span><strong id="dialogStatus">--</strong></div>
          <div><span>Updated</span><strong id="dialogUpdated">--</strong></div>
        </div>

        <label>
          Notes
          <textarea id="dialogNotes" rows="4" placeholder="Add setup notes, issue details, or handoff comments..."></textarea>
        </label>

        <div class="quick-notes">
          <button class="chip" type="button" data-note="Tooling ready">Tooling ready</button>
          <button class="chip" type="button" data-note="Waiting on forklift">Waiting on forklift</button>
          <button class="chip" type="button" data-note="Waiting on maintenance">Waiting on maintenance</button>
          <button class="chip" type="button" data-note="Changeover cleared">Changeover cleared</button>
        </div>
      </div>

      <div class="dialog-actions stack">
        <button type="button" class="button full" data-action="ready">Ready for Changeover</button>
        <button type="button" class="button success full" data-action="change_complete">Complete + Shift</button>
        <button type="button" class="button danger full" data-action="blocked">Flag Maintenance</button>
        <button type="button" class="button full" data-action="clear">Clear Setup</button>
        <button type="button" class="button full" data-action="save_notes">Save Notes Only</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/branding-loader.js"></script>
  <script type="module" src="js/board.js"></script>
</body>
</html>
